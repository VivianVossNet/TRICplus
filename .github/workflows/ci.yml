name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Unit tests
        run: cargo test --lib

      - name: Integration tests
        run: cargo test

      - name: Benchmark (smoke test)
        run: cargo test --release --test benchmark_test -- --ignored check_benchmark_transient_write --nocapture
